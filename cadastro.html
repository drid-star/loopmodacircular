<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop - Cadastro</title>
    <!-- Fonte Satoshi para manter a consistência e elegância visual -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS GERAIS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Satoshi', sans-serif;
        }

        body {
            background-color: #EAE6DF; /* Fundo bege claro idêntico à imagem */
            color: #6E3623; /* Tom marrom escuro padrão */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            
            /* Animação de transição suave */
            animation: pageFadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1), transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.page-fade-out {
            animation: none !important;
            opacity: 0 !important;
            transform: translateY(-8px) !important;
        }

        @keyframes pageFadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- CONTAINER DO FORMULÁRIO --- */
        .login-container {
            width: 100%;
            max-width: 620px; /* Largura proporcional ao layout da imagem */
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- LOGOTIPO INTEGRADO --- */
        .logo-wrapper {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-img-auth {
            max-height: 120px;
            width: auto;
            object-fit: contain;
        }

        /* --- TEXTO DE SUBTÍTULO --- */
        .login-title {
            font-size: 38px;
            font-weight: 500;
            color: #6E3623;
            line-height: 1.2;
            margin-bottom: 45px;
            max-width: 580px;
        }

        .login-title em {
            font-style: normal;
            font-weight: 700;
        }

        /* --- FORMULÁRIO --- */
        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .input-group {
            margin-bottom: 28px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #8C3D2B;
            margin-bottom: 10px;
        }

        .input-field {
            width: 100%;
            background-color: #DDD9D2; /* Fundo cinza/bege escurecido dos inputs */
            border: none;
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 16px;
            color: #6E3623;
            outline: none;
            transition: background-color 0.2s ease;
        }

        .input-field::placeholder {
            color: #A37566;
            opacity: 0.6;
        }

        .input-field:focus {
            background-color: #D3CECF;
            box-shadow: 0 0 0 2px #8C3D2B;
        }

        /* --- BOTÃO CADASTRO --- */
        .submit-btn {
            width: 100%;
            background-color: #8C3D2B; /* Marrom avermelhado do botão */
            color: #FFFFFF;
            border: none;
            border-radius: 50px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .submit-btn:hover {
            background-color: #6E3623;
        }

        .submit-btn:active {
            transform: scale(0.99);
        }

        /* --- LINK PARA ENTRAR --- */
        .toggle-link {
            margin-top: 25px;
            font-size: 14px;
            font-weight: 500;
            color: #A37566;
            text-align: center;
            width: 100%;
        }

        .toggle-link a {
            color: #8C3D2B;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s ease;
        }

        .toggle-link a:hover {
            color: #6E3623;
        }

        /* Responsive Overrides */
        @media (max-width: 480px) {
            body {
                padding: 15px 10px;
            }
            .login-container {
                padding: 0;
            }
            .logo-img-auth {
                max-height: 90px;
            }
            .login-title {
                font-size: 22px;
                margin-bottom: 30px;
            }
            .input-group {
                margin-bottom: 20px;
            }
            .input-field {
                padding: 14px 16px;
                font-size: 15px;
            }
            .submit-btn {
                padding: 14px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <!-- LOGO (Clicável para retornar à Home) -->
        <a href="index.html" class="logo-wrapper">
            <img src="assets/logo-loop.png" alt="Loop Logo" class="logo-img-auth">
        </a>

        <!-- TÍTULO DA PÁGINA -->
        <h1 class="login-title">
            Crie sua conta e descubra <em>brechós</em>, <em>achados e lojas</em> perto de você.
        </h1>

        <!-- FORMULÁRIO DE CADASTRO -->
        <form class="login-form" action="login.html" id="cadastro-form" method="POST">
            
            <!-- Campo Nome -->
            <div class="input-group">
                <label for="name">Nome completo</label>
                <input type="text" id="name" class="input-field" placeholder="Jane Doe" required>
            </div>

            <!-- Campo Email -->
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="input-field" placeholder="jane@framer.com" required>
            </div>

            <!-- Campo Senha -->
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" class="input-field" placeholder="Escolha uma senha forte" required>
            </div>

            <!-- Botão Cadastrar -->
            <button type="submit" class="submit-btn">Cadastrar</button>
            
            <!-- Link Alternativo -->
            <div class="toggle-link">
                Já tem uma conta? <a href="login.html">Entre aqui</a>
            </div>
        </form>

    </div>

    <script>
        document.getElementById('cadastro-form').addEventListener('submit', (e) => {
            e.preventDefault();
            document.body.classList.add('page-fade-out');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 200);
        });
    </script>
    <!-- Script de transição de páginas -->
    <script src="transitions.js"></script>
</body>
</html>
