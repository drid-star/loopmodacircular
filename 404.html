<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Não Encontrada - Loop</title>
    <!-- Fonte Satoshi para um visual elegante -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
    <!-- Folha de estilos externa -->
    <link rel="stylesheet" href="style.css">
    <style>
        .error-container {
            max-width: 600px;
            margin: 60px auto 80px auto;
            padding: 0 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .error-card {
            background-color: #FFFFFF;
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 4px 15px rgba(110, 54, 35, 0.05);
            border: 1px solid #EAE6DF;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animação flutuante para o recurso visual */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .error-visual-wrapper {
            width: 180px;
            height: 180px;
            margin-bottom: 30px;
            animation: float 4s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-visual-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .error-code {
            font-size: 80px;
            font-weight: 900;
            color: #8C3D2B;
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .error-title {
            font-size: 24px;
            font-weight: 700;
            color: #6E3623;
            margin-bottom: 15px;
        }

        .error-message {
            font-size: 16px;
            color: #A37566;
            line-height: 1.6;
            margin-bottom: 35px;
            max-width: 440px;
        }

        .back-home-btn {
            background-color: #8C3D2B;
            color: #FFFFFF;
            padding: 14px 35px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 10px rgba(140, 61, 43, 0.15);
        }

        .back-home-btn:hover {
            background-color: #6E3623;
            transform: translateY(-1px);
        }

        .back-home-btn:active {
            transform: scale(0.99);
        }

        /* Responsividade Mobile */
        @media (max-width: 480px) {
            .error-card {
                padding: 40px 20px;
                border-radius: 20px;
            }
            .error-visual-wrapper {
                width: 140px;
                height: 140px;
            }
            .error-code {
                font-size: 60px;
            }
            .error-title {
                font-size: 20px;
            }
            .error-message {
                font-size: 14px;
            }
            .back-home-btn {
                width: 100%;
                display: block;
                padding: 12px 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo" id="logo-btn"><img src="logo_white.png" alt="Loop" class="logo-img"></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="busca.html">Busca</a></li>
                <li><a href="perfil.html">Perfil</a></li>
                <li><a href="anuncie.html">Seu Brechó</a></li>
                <li><a href="cadastro.html">Cadastre-se</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="error-container">
        <div class="error-card">
            <!-- Recurso Visual (Asset Ativo 10) -->
            <div class="error-visual-wrapper">
                <img src="Ativo 10.png" alt="Recurso Visual Erro" class="error-visual-img">
            </div>

            <!-- Código e Textos do Erro -->
            <div class="error-code">404</div>
            <h1 class="error-title">Página Não Encontrada</h1>
            <p class="error-message">
                Oops! O brechó ou caminho que você procurava garimpar sumiu do mapa, mudou de endereço ou nunca existiu.
            </p>

            <!-- Botão de retorno -->
            <a href="index.html" class="back-home-btn">Voltar para a Home</a>
        </div>
    </main>

    <!-- Script de transição de páginas -->
    <script src="transitions.js"></script>
</body>
</html>
